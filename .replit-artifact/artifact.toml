kind = "web"
previewPath = "/"
title = "Divine Marble — Idol Manufacturers"
version = "1.0.0"
id = "artifacts/divine-marble"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20985

[services.development]
run = "pnpm --filter @workspace/divine-marble run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/divine-marble", "run", "build" ]
publicDir = "artifacts/divine-marble/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20985"
BASE_PATH = "/"
